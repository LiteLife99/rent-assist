[loggers]
keys=root,uvicorn,uvicorn.error,uvicorn.customaccess

[handlers]
keys=default,stdout

[formatters]
keys=default

[logger_root]
level=INFO
handlers=default
propagate=1

[logger_uvicorn]
level=INFO
handlers=default
propagate=0
qualname=uvicorn

[logger_uvicorn.error]
level=INFO
handlers=default
propagate=0
qualname=uvicorn.error

[logger_uvicorn.customaccess]
level=INFO
handlers=stdout
propagate=0
qualname=uvicorn.customaccess

[handler_default]
class=logging.StreamHandler
formatter=default
stream="ext://sys.stderr"

[handler_stdout]
class=logging.StreamHandler
formatter=default
stream="ext://sys.stdout"

[formatter_default]
class=uvicorn.logging.DefaultFormatter
fmt="%(asctime)s %(levelname)s [%(name)s] [%(filename)s:%(lineno)d] - %(message)s"
